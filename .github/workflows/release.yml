name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    permissions:
      contents: write
      issues: write
      pull-requests: write
      # Required for npm trusted publishing via OIDC (short-lived, no NPM_TOKEN)
      # and for npm provenance attestations.
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Node 24 bundles npm 11.x, which satisfies trusted publishing's npm >= 11.5.1
          # requirement while still running dependency install scripts (Cypress downloads
          # its binary in a postinstall hook). Do NOT force npm@latest: npm 12 disables
          # dependency install scripts by default, which breaks the Cypress install.
          node-version: '24'
          cache: 'npm'

      # Install exactly what package-lock.json pins so CI is reproducible.
      - name: Install dependencies
        run: npm ci

      - name: Install Rollup Dependency
        run: npm install rollup

      - name: Build
        run: npm run build

      - name: Start dev server
        run: npm run dev &
        env:
          PORT: 5174

      - name: Wait for dev server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5174 > /dev/null; then
              echo "Server is up!"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run tests
        run: npm test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release 